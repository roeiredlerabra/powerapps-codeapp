# ──────────────────────────────────────────────────────────────────────────────
# Power Platform Code App — Build & Release
#
# Triggered on every push to main.
# NO Power Platform environment connection required.
#
# Steps:
#   1. npm ci + npm run build  (TypeScript → Vite bundle)
#   2. Copy built dist/ into solution-src/ (replaces old Code App assets)
#   3. Bump <Version> in solution-src/Other/Solution.xml → 1.0.0.<run_number>
#   4. pac solution pack → unmanaged zip
#   5. pac solution pack --managed → managed zip
#   6. Create a GitHub Release with both zip packages attached
#
# No secrets required.
# ──────────────────────────────────────────────────────────────────────────────

name: Build & Package Solution

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SOLUTION_NAME: codeapps_powerplatform
  NODE_VERSION: '22'

jobs:
  build-and-release:
    name: Build, Pack & Release
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required for creating GitHub Releases

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # ── 3. Build ───────────────────────────────────────────────────────────
      - name: Build code app (TypeScript → Vite bundle)
        run: npm run build

      # ── 4. Copy built assets into the solution source tree ─────────────────
      # The solution stores the Code App bundle under:
      #   solution-src/CanvasApps/abra__988ca_CodeAppPackages/
      # We replace the old assets with the freshly built ones.
      - name: Update solution source with latest build
        run: |
          DEST="solution-src/CanvasApps/abra__988ca_CodeAppPackages"
          # Remove old assets
          rm -rf "${DEST}/assets" "${DEST}/index.html" "${DEST}/vite.svg"
          # Copy new build output
          cp -r dist/. "${DEST}/"
          echo "Updated ${DEST} with new build"
          ls -la "${DEST}"

      # ── 5. Version calculation ─────────────────────────────────────────────
      # Version format:  1.0.0.<github_run_number>
      # e.g. first run → 1.0.0.1,  second run → 1.0.0.2  etc.
      - name: Calculate version
        id: ver
        run: |
          BASE=$(node -p "require('./package.json').version")
          REV=${{ github.run_number }}
          PP_VER="${BASE}.${REV}"
          TAG="v${PP_VER}"
          echo "pp_version=${PP_VER}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"           >> $GITHUB_OUTPUT
          echo "Version: ${PP_VER}"

      # ── 6. Bump <Version> in Solution.xml ──────────────────────────────────
      - name: Bump Solution.xml version to ${{ steps.ver.outputs.pp_version }}
        run: |
          sed -i "s|<Version>[^<]*</Version>|<Version>${{ steps.ver.outputs.pp_version }}</Version>|" \
            solution-src/Other/Solution.xml
          grep "<Version>" solution-src/Other/Solution.xml

      # ── 7. Install PAC CLI ─────────────────────────────────────────────────
      # Installs the Power Platform CLI as a .NET global tool (no auth needed).
      - name: Install Power Platform CLI (pac)
        run: |
          dotnet tool install --global Microsoft.PowerApps.CLI.Tool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      # ── 8. Pack — UNMANAGED ────────────────────────────────────────────────
      - name: Pack unmanaged solution
        run: |
          pac solution pack \
            --zipfile "artifacts/${{ env.SOLUTION_NAME }}_${{ steps.ver.outputs.pp_version }}_unmanaged.zip" \
            --folder  solution-src \
            --packagetype Unmanaged

      # ── 9. Pack — MANAGED ─────────────────────────────────────────────────
      - name: Pack managed solution
        run: |
          pac solution pack \
            --zipfile "artifacts/${{ env.SOLUTION_NAME }}_${{ steps.ver.outputs.pp_version }}_managed.zip" \
            --folder  solution-src \
            --packagetype Managed

      # ── 10. Upload as workflow artifacts ───────────────────────────────────
      - name: Upload solution packages as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: solution-${{ steps.ver.outputs.pp_version }}
          path: artifacts/

      # ── 11. GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release ${{ steps.ver.outputs.tag }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ steps.ver.outputs.tag }}
          name:                   "Solution ${{ steps.ver.outputs.pp_version }}"
          generate_release_notes: true
          body: |
            ## מערכת ציוד טכני — Power Platform Solution ${{ steps.ver.outputs.pp_version }}

            Auto-built from commit [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            ### How to install

            | Package | When to use |
            |---------|-------------|
            | `${{ env.SOLUTION_NAME }}_${{ steps.ver.outputs.pp_version }}_unmanaged.zip` | **פיתוח / Dev** — import into dev/test, fully customisable |
            | `${{ env.SOLUTION_NAME }}_${{ steps.ver.outputs.pp_version }}_managed.zip`   | **ייצור / Prod** — import into production, locked & managed |

            **Import steps:**
            1. [make.powerapps.com](https://make.powerapps.com) → Solutions → Import Solution
            2. Upload the zip → Next → Import
          files: artifacts/*.zip

